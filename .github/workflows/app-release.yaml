name: App / Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version-file: .tools-versions
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@f29f5a9d7b09a7c6b29859002d29d24e1674c884 # v5.0.1
      - name: Set version from tag
        run: echo "MOONFIN_VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
      - name: Assemble APKs
        run: ./gradlew assembleGithubDebug
      - name: Collect APKs
        run: mkdir -p build/release/; find app/build/ -iname "*.apk" -exec mv "{}" build/release/ \;
      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: build/release/*.apk
