name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: ./gradlew assembleDebug -Pjellyfin.version=${{ steps.version.outputs.VERSION }}

      - name: Find and rename APK
        run: |
          APK=$(find app/build/outputs/apk -name '*.apk' | head -1)
          echo "Found APK: $APK"
          cp "$APK" app/build/outputs/apk/jellyfin-tentacle-androidtv-${{ steps.version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/jellyfin-tentacle-androidtv-${{ steps.version.outputs.VERSION }}.apk
          generate_release_notes: true
